<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register FarmTrack</title>

    <link href="../stylecss/daftar.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(../image/bg\ figma.jpeg);
            background-size: cover;
            background-position: center;
            font-family: sans-serif;
        }

        .register-box {
            width: 900px;
            padding: 40px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            color: white;
        }

        .register-title {
            font-size: 30px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 25px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 20px;
            color: white;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            box-shadow: none;
        }

        .btn-register {
            background: #43a047;
            border: none;
            border-radius: 25px;
            padding: 12px;
            font-weight: 500;
        }

        .btn-register:hover {
            background: #2e7d32;
        }

        .farm-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 30px;
        }
    </style>

</head>

<body>
    <div class="register-box">
        <div class="row">
            <div class="col-md-6">
                <div class="register-title">Register Akun FarmTrack</div>
                <div class="subtitle">Track Your Farm, Grow Your Future.</div>

                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Nama Lengkap">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="mb-4">
                        <input type="password" class="form-control" placeholder="Konfirmasi Password">
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-register">Daftar Sekarang</button>
                    </div>

                </form>
            </div>
            <div class="col-md-6">

                <img class="farm-img" src="bg daftar akun.jpeg">

            </div>

        </div>

    </div>

</body>

</html>
