<!DOCTYPE html>
<html lang="id">
<link rel="stylesheet" href="style.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmTrack - Data Pakan</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: justify;
            align-items: justify;
            background-image: url("../image/bg\ figma.jpeg");
            background-size: cover;
            background-position: center;
            font-family: sans-serif;
        }

        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 230px;
            background: #2e7d32;
            color: white;
            padding: 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .menu button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 8px;
            background: #43a047;
            color: white;
            cursor: pointer;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Search bar */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 25px;
            border: none;
            outline: none;
            height: 40px;
            font-size: 14px;
            background: #f5f5f5;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 2px #4caf50;
        }

        .search-bar button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #4caf50;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-bar button:hover {
            background: #43a047;
            transform: translateY(-1px);
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #f0f0f0;
        }

        .action button {
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .edit {
            background: #4caf50;
        }

        .delete {
            background: #e53935;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">FarmTrack</div>

            <div class="menu">
                <button>DASHBOARD</button>
                <button>KANDANG</button>
                <button>PRODUKSI</button>
                <button>KARYAWAN</button>
                <button>PAKAN</button>
                <button>PENGATURAN</button>
            </div>
        </div>

        <!-- Main -->
        <div class="main">

            <!-- Statistik -->
            <div class="cards">
                <div class="card">Total Kandang<br><b>10</b></div>
                <div class="card">Total Ayam<br><b>5,275</b></div>
                <div class="card">Produksi Hari Ini<br><b>2,759</b></div>
                <div class="card">Karyawan Aktif<br><b>8</b></div>
            </div>

            <!-- Search -->
            <div class="search-bar">
                <input type="text" placeholder="Search">
                <button>UMUR AYAM</button>
                <button>JUMLAH AYAM</button>
                <button>TAMBAH KANDANG</button>
            </div>

            <!-- Table -->
            <h2>PAKAN</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID_PAKAN</th>
                        <th>NAMA_PAKAN</th>
                        <th>JENIS</th>
                        <th>STOCK</th>
                        <th>ID_KANDANG</th>
                        <th>Change</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>4P</td>
                        <td>500</td>
                        <td>97</td>
                        <td>K01</td>
                        <td>KD01</td>
                        <td class="action">
                            <button class="edit">Edit</button>
                            <button class="delete">Delete</button>
                        </td>
                    </tr>

                    <tr>
                        <td>7</td>
                        <td>876</td>
                        <td>97</td>
                        <td>K02</td>
                        <td>KD02</td>
                        <td class="action">
                            <button class="edit">Edit</button>
                            <button class="delete">Delete</button>
                        </td>
                    </tr>

                    <tr>
                        <td>14</td>
                        <td>323</td>
                        <td>95</td>
                        <td>K03</td>
                        <td>KD03</td>
                        <td class="action">
                            <button class="edit">Edit</button>
                            <button class="delete">Delete</button>
                        </td>
                    </tr>

                </tbody>
            </table>

        </div>
    </div>

</body>

</html>
