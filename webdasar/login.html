        <div id="notif"></div>

        <form action="insert_login.php" method="POST">

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="Password" required>

    <script>
        // Tampilkan notifikasi berdasarkan ?status= di URL
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const notif  = document.getElementById('notif');

        const pesan = {
            kosong         : ['error',  'Email dan password tidak boleh kosong.'],
            email_invalid  : ['error',  'Format email tidak valid.'],
            password_salah : ['error',  'Password salah. Coba lagi.'],
            email_tidak_ada: ['error',  'Email tidak terdaftar.'],
            daftar_berhasil: ['sukses', 'Pendaftaran berhasil! Silakan login.'],
        };

        if (status && pesan[status]) {
            const [tipe, teks] = pesan[status];
            notif.innerHTML = `<div class="notif ${tipe}">${teks}</div>`;
        }
    </script>

</body>
